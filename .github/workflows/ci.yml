name: CI

on:
  push:
    branches:
      - main
      - MUL-44
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libboost-all-dev \
            libpulse-dev \
            libasound2-dev \
            pkg-config \
            libavahi-client-dev \
            libflac-dev \
            libogg-dev \
            libvorbis-dev \
            libopus-dev

      - name: Set up GO
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend-go/go.sum
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-react/package-lock.json
      
      - name: Create artifacts directories
        run: mkdir -p artifacts/launcher-cpp artifacts/backend-go
        

      - name: Build backend-go
        env: 
          CGO_ENABLED: 0
        run: |
          mkdir -p artifacts/backend-go/
          go build -C backend-go -o ../artifacts/backend-go/backend-go .

      - name: Build launcher-cpp
        run: |
          cmake -S launcher-cpp -B artifacts/launcher-cpp -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
          cmake --build artifacts/launcher-cpp --config Release --parallel $(nproc)

      - name: Build web-react
        run: |
          cd web-react
          npm ci
          npm run build
          cp -r dist ../artifacts/web-react

      - name: Copy config
        run: cp -r config artifacts/config
      
      - name: Confirm build
        run: |
          echo ===BACKEND-GO=====
          ls -lh artifacts/backend-go/*
          echo ==================
          echo ===LAUNCHER-CPP===
          ls -lh artifacts/launcher-cpp/*
          echo ==================
          echo ==WEB-REACT=======
          ls -lh artifacts/web-react/*
          echo ==================
          
      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-amd64-${{ github.ref_name }}-${{ steps.sha.outputs.short }}
          path: |
            artifacts/backend-go/
            artifacts/web-react/
            artifacts/config/
            artifacts/launcher-cpp/bin
          retention-days: 7
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libboost-all-dev \
            libpulse-dev \
            libasound2-dev \
            pkg-config \
            libavahi-client-dev \
            libflac-dev \
            libogg-dev \
            libvorbis-dev \
            libopus-dev

      - name: Setup up GO
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"
          cache-dependency-path: backend-go/go.sum
          
      - name: Run Go tests
        run: |
          cd backend-go
          go test ./... -v -timeout 60s
      
      - name: Go vet
        run: |
          cd backend-go
          go vet ./...

      - name: Build launcher-cpp tests
        run: |
          cmake \
            -S launcher-cpp \
            -B build-test \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTS=ON \
            -DSNAPCAST_BUILD_TESTS=OFF \
            -DBUILD_TESTING=OFF
          cmake --build build-test \
            --config Debug \
            --parallel $(nproc)

      - name: Run launcher-cpp tests
        run: |
          cd build-test
          ctest --output-on-failure

  package:
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron-app/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            fakeroot \
            dpkg \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            xvfb

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-linux-amd64-*
          merge-multiple: true
          path: artifacts/

      - name: Install Electron app dependencies
        run: cd electron-app && npm ci

      - name: Build .deb
        run: |
          cd electron-app
          xvfb-run --auto-servernum npm run make -- --platform linux
          
          find out/make -name "*.deb" | xargs ls -lh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ github.ref_name }}
          path: electron-app/out/make/**/*.deb
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: installer-${{ github.ref_name }}
          path: releaset-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Multiroom ${{ github.ref_name }}"
          generate_release_notes: true
          files: releaset-assets/**/*.deb