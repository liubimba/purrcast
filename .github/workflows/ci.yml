name: CI

on:
  push:
    branches:
      - main
      - MUL-44
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libboost-all-dev \
            libpulse-dev \
            libasound2-dev \
            pkg-config \
            libavahi-client-dev \
            libflac-dev \
            libogg-dev \
            libvorbis-dev \
            libopus-dev

      - name: Set up GO
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend-go/go.sum
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-react/package-lock.json
      
      - name: Create artifacts directories
        run: mkdir -p artifacts/launcher-cpp artifacts/backend-go
        

      - name: Build backend-go
        env: 
          CG0_ENABLED: 0
        run: |
          mkdir -p artifacts/backend-go/
          go build -C backend-go -o ../artifacts/backend-go/backend-go .

      - name: Build launcher-cpp
        run: |
          cmake -S launcher-cpp -B artifacts/launcher-cpp -DCMAKE_BUILD_TYPE=Release
          cmake --build artifacts/launcher-cpp --config Release --parallel $(nproc)
          
      - name: Build web-react
        run: |
          cd web-react
          npm ci
          npm run build
          cp -r dist ../artifacts/web-react
          
      - name: Copy config
        run: cp -r config artifacts/config
      
      - name: Confirm build
        run: |
          echo ===BACKEND-GO=====
          ls -lh artifacts/backend-go/*
          echo ==================
          echo ===LAUNCHER-CPP===
          ls -lh artifacts/launcher-cpp/*
          echo ==================
          echo ==WEB-REACT=======
          ls -lh artifacts/web-react/*
          echo ==================
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-amd64
          path: |
            artifacts/backend-go/
            artifacts/web-react/
            artifacts/config/
            artifacts/launcher-cpp/bin
            artifacts/launcher-cpp/lib
          retention-days: 7